{% extends "base.html" %}
{% block title %}Reset Password — Recipe Tracker{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="card card-shadow border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-lock display-4 text-success"></i>
                    <h4 class="mt-2 fw-bold">Reset Password</h4>
                </div>
                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" class="form-control" name="password" placeholder="At least 8 characters" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control" name="confirm_password" placeholder="Repeat password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2">
                        <i class="bi bi-check-circle me-2"></i>Reset Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
