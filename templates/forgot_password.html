{% extends "base.html" %}
{% block title %}Forgot Password — Recipe Tracker{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="card card-shadow border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-key display-4 text-success"></i>
                    <h4 class="mt-2 fw-bold">Forgot Password</h4>
                    <p class="text-muted small">Enter your email and we'll send a reset link.</p>
                </div>
                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" name="email" placeholder="your@email.com" required autofocus>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2">
                        <i class="bi bi-send me-2"></i>Send Reset Link
                    </button>
                </form>
                <hr class="my-3">
                <p class="text-center mb-0"><a href="{{ url_for('login') }}" class="text-decoration-none">Back to login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
