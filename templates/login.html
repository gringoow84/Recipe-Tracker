{% extends "base.html" %}
{% block title %}Login — Recipe Tracker{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="card card-shadow border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-journal-richtext display-4 text-success"></i>
                    <h3 class="mt-2 fw-bold">Recipe Tracker</h3>
                    <p class="text-muted">All your recipes, in one place.</p>
                </div>
                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" name="username" placeholder="Enter username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" name="password" placeholder="Enter password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
                <hr class="my-3">
                <p class="text-center mb-1">
                    <a href="{{ url_for('forgot_password') }}" class="text-decoration-none text-muted small">
                        <i class="bi bi-key me-1"></i>Forgot your password?
                    </a>
                </p>
                <p class="text-center mb-0">
                    Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
